<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="logo">✦</div>
        <h1>Expense Tracker</h1>
        <p class="tagline">Stay on top of every rupee</p>
        <p class="description">
          Manage your income, track your expenses, and understand your budget in one simple dashboard.
        </p>
      </div>

      <div class="right-panel">
        <div class="login-box">
          <h2>Welcome Back</h2>
          <p class="subtitle">Sign in to continue</p>

          <form id="loginForm">
            <div class="input-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="admin@gmail.com" required />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="123456" required />
            </div>

            <div class="forgot">
              <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
          </form>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>

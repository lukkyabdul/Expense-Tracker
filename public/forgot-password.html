<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Expense Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="login.css" />
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        document.body.className = localStorage.getItem('selectedTheme') || 'theme-crimson';
      });
    </script>
  </head>
  <body class="theme-crimson">
    <div class="container">
      <div class="left-panel">
        <div class="logo">✦</div>
        <h1>Expense Tracker</h1>
        <p class="tagline">Reset your password</p>
        <p class="description">
          Enter your email and we'll send you instructions to reset your password.
        </p>
      </div>

      <div class="right-panel">
        <div class="login-box">
          <h2>Forgot Password</h2>
          <p class="subtitle">No worries, we'll help you out</p>

          <form id="forgotPasswordForm">
            <div class="input-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="your.email@example.com" required />
            </div>

            <button type="submit" class="login-btn">Send Reset Instructions</button>
            <p class="form-link">Remembered your password? <a href="login.html">Login here</a></p>
          </form>
          <div id="message" class="form-message"></div>
        </div>
      </div>
    </div>

    <script src="forgot-password.js"></script>
  </body>
</html>
